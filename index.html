    <script>
        let subscriptions = JSON.parse(localStorage.getItem('vpn_subs')) || [];
        let currentEditId = null;
        let currentLanguage = 'ru'; 
        let selectedDomain = 'github.io'; 

        const translations = {
            ru: {
                title: "Панель управления", mySubs: "Мои Подписки:", create: "Создать",
                addUsr: "Отправите ваш имя пользователя:", addTitle: "Отправите название для подписки:",
                addDate: "Отправите время окончании для подписок:", addCode: "Отправите ваш код (VPN ссылки):",
                editTitle: "Изменение подписки", editUsr: "Имя Пользователя:", editDate: "Время окончании:",
                editSites: "Веб-сайт и Сайт о помощи:", paramTitle: "Параметры:", btnBlock: "Заблокировать Подписку",
                btnUnblock: "Разблокировать Подписку", btnReset: "Сбросить Подписку", btnDomain: "Изменить Домен",
                btnDelete: "Удалить Подписку", btnCancel: "Отмена", btnSave: "Сохранить", checkPing: "Проверить Пинг"
            },
            en: {
                title: "Admin Panel", mySubs: "My Subscriptions:", create: "Create",
                addUsr: "Send your username:", addTitle: "Send subscription title:",
                addDate: "Send subscription expiration time:", addCode: "Send your code (VPN links):",
                editTitle: "Edit Subscription", editUsr: "Username:", editDate: "Expiration Time:",
                editSites: "Web Site & Support Site:", paramTitle: "Parameters:", btnBlock: "Block Subscription",
                btnUnblock: "Unblock Subscription", btnReset: "Reset Data Usage", btnDomain: "Change Domain",
                btnDelete: "Delete Subscription", btnCancel: "Cancel", btnSave: "Save", checkPing: "Check Ping"
            },
            tk: {
                title: "Dolandyryş paneli", mySubs: "Meniň abunalyklarym:", create: "Döretmek",
                addUsr: "Ulanyjy adyňyzy iberiň:", addTitle: "Abunalygyň adyny iberiň:",
                addDate: "Abunalygyň gutarýan wagtyny iberiň:", addCode: "Koduňyzy iberiň (VPN baglanyşyklary):",
                editTitle: "Abunalygy üýtgetmek", editUsr: "Ulanyjy ady:", editDate: "Gutarýan wagty:",
                editSites: "Web-saýt we goldaw saýty:", paramTitle: "Parametrler:", btnBlock: "Abunalygy bökdemek",
                btnUnblock: "Abunalygy açmak", btnReset: "Maglumaty nol wezipä getirmek", btnDomain: "Domany üýtgetmek",
                btnDelete: "Abunalygy pozmak", btnCancel: "Yza", btnSave: "Ýazdyrmak", checkPing: "Ping barlamak"
            }
        };

        function saveToStorage() {
            localStorage.setItem('vpn_subs', JSON.stringify(subscriptions));
            renderSubscriptions();
        }

        function renderSubscriptions() {
            const container = document.getElementById('subscriptionsContainer');
            container.innerHTML = "";

            if(subscriptions.length === 0) {
                container.innerHTML = "<div style='color:#777; font-size:14px; text-align:center; padding:10px;'>Нет активных подписок</div>";
                return;
            }

            subscriptions.forEach(sub => {
                const card = document.createElement('div');
                card.className = `sub-card ${sub.isBlocked ? 'blocked' : ''}`;
                
                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-username">${sub.username} ${sub.isBlocked ? '🛑' : ''}</div>
                        <div class="card-actions">
                            <button class="icon-btn" onclick="copySubscriptionLink('${sub.id}')" title="Копировать ссылку">📋</button>
                            <button class="icon-btn" onclick="openEditModal('${sub.id}')" title="Изменить">✏️</button>
                        </div>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar-text">_______________________________</div>
                        <div class="progress-bar-text">${sub.usedData} / ∞</div>
                    </div>
                    <button class="card-open-btn" onclick="openClientScreen('${sub.id}')">Открыть</button>
                `;
                container.appendChild(card);
            });
        }

        function addNewSubscription() {
            const username = document.getElementById('newUsername').value.trim();
            const title = document.getElementById('newTitle').value.trim() || 'User Information';
            const date = document.getElementById('newDate').value.trim() || '01.01.2033';
            const code = document.getElementById('newCode').value.trim();

            if(!username || !code) {
                alert("Заполните поля имени пользователя и кода VPN!");
                return;
            }

            const newSub = {
                id: 'sub_' + Date.now(),
                username: username,
                title: title,
                date: date,
                code: code,
                webSite: 'https://max.ru',
                supportSite: 'https://max.ru',
                isBlocked: false,
                usedData: '0B'
            };

            subscriptions.push(newSub);
            saveToStorage();

            document.getElementById('newUsername').value = "";
            document.getElementById('newTitle').value = "";
            document.getElementById('newDate').value = "";
            document.getElementById('newCode').value = "";
        }

        function copySubscriptionLink(id) {
            const sub = subscriptions.find(s => s.id === id);
            if(!sub) return;
            const currentUrl = window.location.href.split('?')[0];
            const baseUrl = currentUrl.replace('github.io', selectedDomain);
            const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(sub))));
            const finalUrl = `${baseUrl}?subData=${encoded}`;
            
            navigator.clipboard.writeText(finalUrl).then(() => {
                alert(`Ссылка скопирована для домена: ${selectedDomain}`);
            });
        }

        function openEditModal(id) {
            currentEditId = id;
            const sub = subscriptions.find(s => s.id === id);
            if(!sub) return;

            const fields = ['editUserField', 'editDateField', 'editWebField', 'editSupportField'];
            fields.forEach(fId => {
                const f = document.getElementById(fId);
                f.disabled = true;
                f.classList.remove('editable');
            });

            document.getElementById('editUserField').value = sub.username;
            document.getElementById('editDateField').value = sub.date;
            document.getElementById('editWebField').value = sub.webSite;
            document.getElementById('editSupportField').value = sub.supportSite;

            const blockBtn = document.getElementById('btnParamBlock');
            blockBtn.textContent = sub.isBlocked ? translations[currentLanguage].btnUnblock : translations[currentLanguage].btnBlock;

            document.getElementById('editModal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            currentEditId = null;
        }

        function enableEdit(fieldId) {
            const field = document.getElementById(fieldId);
            field.disabled = false;
            field.classList.add('editable');
            field.focus();
        }

        function saveSubscriptionChanges() {
            if (!currentEditId) return;
            const sub = subscriptions.find(s => s.id === currentEditId);
            if (sub) {
                sub.username = document.getElementById('editUserField').value.trim();
                sub.date = document.getElementById('editDateField').value.trim();
                sub.webSite = document.getElementById('editWebField').value.trim();
                sub.supportSite = document.getElementById('editSupportField').value.trim();
                saveToStorage();
            }
            closeEditModal();
        }

        function modalToggleBlock() {
            if (!currentEditId) return;
            const sub = subscriptions.find(s => s.id === currentEditId);
            if (sub) {
                sub.isBlocked = !sub.isBlocked;
                saveToStorage();
                const blockBtn = document.getElementById('btnParamBlock');
                blockBtn.textContent = sub.isBlocked ? translations[currentLanguage].btnUnblock : translations[currentLanguage].btnBlock;
            }
        }

        function modalResetData() {
            if (!currentEditId) return;
            const sub = subscriptions.find(s => s.id === currentEditId);
            if (sub) {
                sub.usedData = '0B';
                saveToStorage();
                alert("Использование данных сброшено.");
            }
        }

        function modalChangeDomain() {
            const domains = ['github.io', 'vless.net', 'vpn-config.com'];
            let currentIndex = domains.indexOf(selectedDomain);
            currentIndex = (currentIndex + 1) % domains.length;
            selectedDomain = domains[currentIndex];
            alert(`Выбран новый домен для ссылок: ${selectedDomain}`);
        }

        function modalDeleteSub() {
            if (!currentEditId) return;
            if (confirm("Вы уверены, что хотите удалить эту подписку?")) {
                subscriptions = subscriptions.filter(s => s.id !== currentEditId);
                saveToStorage();
                closeEditModal();
            }
        }

        function openPingModal() {
            document.getElementById('pingModal').style.display = 'flex';
        }

        function closePingModal() {
            document.getElementById('pingModal').style.display = 'none';
        }

        function runPingCheck() {
            const results = document.getElementById('pingListResults');
            results.innerHTML = "Проверка...";
            setTimeout(() => {
                results.innerHTML = `
                    <div class="ping-item"><span>Server 1 (DE)</span><span>45ms</span></div>
                    <div class="ping-item"><span>Server 2 (NL)</span><span>52ms</span></div>
                    <div class="ping-item"><span>Server 3 (US)</span><span>120ms</span></div>
                `;
            }, 1000);
        }

        function openClientScreen(id) {
            const sub = subscriptions.find(s => s.id === id);
            if (!sub) return;
            document.getElementById('cliUsername').textContent = sub.username;
            document.getElementById('cliStatus').textContent = sub.isBlocked ? 'blocked' : 'active';
            document.getElementById('cliDate').textContent = sub.date;
            document.getElementById('cliUsed').textContent = sub.usedData;
            
            const list = document.getElementById('cliLinksList');
            list.innerHTML = `<li class="client-item">${sub.code}</li>`;
            
            document.getElementById('clientScreen').style.display = 'block';
        }

        function closeClientScreen() {
            document.getElementById('clientScreen').style.display = 'none';
        }

        function toggleLanguage() {
            const langs = ['ru', 'en', 'tk'];
            let idx = langs.indexOf(currentLanguage);
            currentLanguage = langs[(idx + 1) % langs.length];
            
            const t = translations[currentLanguage];
            document.getElementById('langBtn').textContent = currentLanguage === 'ru' ? '🌐 Русский' : currentLanguage === 'en' ? '🌐 English' : '🌐 Türkmençe';
            
            document.getElementById('panelTitle').textContent = t.title;
            document.getElementById('lblMySubs').textContent = t.mySubs;
            document.getElementById('btnCreate').textContent = t.create;
            document.getElementById('lblAddUser').textContent = t.addUsr;
            document.getElementById('lblAddTitle').textContent = t.addTitle;
            document.getElementById('lblAddDate').textContent = t.addDate;
            document.getElementById('lblAddCode').textContent = t.addCode;
            
            // Обновление текстов в модалке
            document.getElementById('modalEditTitle').textContent = t.editTitle;
            document.getElementById('lblEditUser').textContent = t.editUsr;
            document.getElementById('lblEditDate').textContent = t.editDate;
            document.getElementById('lblEditSites').textContent = t.editSites;
            document.getElementById('lblParamsTitle').textContent = t.paramTitle;
            document.getElementById('btnParamReset').textContent = t.btnReset;
            document.getElementById('btnParamDomain').textContent = t.btnDomain;
            document.getElementById('btnParamDelete').textContent = t.btnDelete;
            document.getElementById('btnCancel').textContent = t.btnCancel;
            document.getElementById('btnSave').textContent = t.btnSave;
            document.getElementById('btnCheckPing').textContent = t.checkPing;
        }

        // Первичный рендер при загрузке страницы
        renderSubscriptions();
    </script>
</body>
</html>
