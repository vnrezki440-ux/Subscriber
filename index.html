<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscriber Manager</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .menu-container {
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
            background: #fff;
            border: 2px solid #333;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 26px;
            margin-bottom: 25px;
            font-weight: bold;
        }
        .sub-button {
            display: block;
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background-color: #ffffff;
            color: #333333;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid #333333;
            border-radius: 8px;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        .sub-button:active {
            background-color: #333333;
            color: #ffffff;
        }
        
        .block-title {
            font-size: 18px;
            font-weight: bold;
            margin-top: 30px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-top: 1px dashed #ccc;
            padding-top: 20px;
        }
        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #444;
        }
        .input-field {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: 2px solid #333;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #fafafa;
        }
        .create-btn, .action-btn {
            width: 100%;
            padding: 14px;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
        }
        .create-btn:active, .action-btn:active {
            background-color: #555;
        }
        .action-btn {
            background-color: #2ea44f; /* Зеленый цвет в стиле GitHub */
        }
        .action-btn:active {
            background-color: #24823e;
        }
        .result-box, .textarea-field {
            width: 100%;
            height: 130px;
            margin-top: 15px;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            border: 2px solid #333;
            border-radius: 6px;
            box-sizing: border-box;
            resize: none;
            text-align: left;
        }
        .result-box {
            background-color: #222;
            color: #fff;
        }
        .textarea-field {
            background-color: #fff;
            color: #333;
            height: 150px;
        }
        .status-msg {
            color: #2ea44f;
            font-size: 14px;
            margin-top: 8px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1>Subscriber</h1>
        
        <a href="https://gist.github.com" class="sub-button">Github Subscription</a>
        <a href="https://pastee.dev" class="sub-button">Pasta Subscription</a>
        
        <div class="block-title">Block for Subscription</div>
        
        <div class="input-group">
            <label>Subscription Name:</label>
            <input type="text" id="subName" class="input-field" placeholder="Например: AsensioVPNS">
        </div>
        
        <div class="input-group">
            <label>Write Your Limit:</label>
            <input type="text" id="subLimit" class="input-field" placeholder="Например: 50GB или 0">
        </div>
        
        <div class="input-group">
            <label>Write Your Web Site and support site:</label>
            <input type="text" id="webAndSupport" class="input-field" placeholder="Например: https://max.ru">
        </div>

        <button class="create-btn" onclick="generateConfig()">Create</button>
        <textarea id="resultCode" class="result-box" readonly placeholder="Здесь появится сгенерированный заголовок..."></textarea>

        <div class="block-title">Submit Your Code:</div>
        
        <div class="input-group">
            <label>Вставь сюда свои VPN ссылки (каждую с новой строки):</label>
            <textarea id="userCodes" class="textarea-field" placeholder="trojan://...&#10;vless://...&#10;hysteria2://..."></textarea>
        </div>

        <button class="action-btn" onclick="createSubscription()">Создать Подписку</button>
        <div id="status" class="status-msg">Код скопирован! Перенаправляем на GitHub Gist... 🚀</div>
    </div>

    <script>
        let generatedHeader = "";

        function generateConfig() {
            const name = document.getElementById('subName').value || 'AsensioVPNS';
            const limitValue = document.getElementById('subLimit').value || '0';
            const siteUrl = document.getElementById('webAndSupport').value || 'https://max.ru';

            generatedHeader = 
`# profile-title: ${name}
#!name=${name}
# profile-update-interval: 1
# profile-web-page-url: ${siteUrl}
# support-url: ${siteUrl}
# subscription-userinfo: upload=0; download=0; total=${limitValue}`;

            document.getElementById('resultCode').value = generatedHeader;
        }

        function createSubscription() {
            // Если заголовок не был создан по кнопке Create, создаем его автоматически
            if (!generatedHeader) {
                generateConfig();
            }

            const vpnCodes = document.getElementById('userCodes').value;
            const finalFullText = generatedHeader + "\n\n" + vpnCodes;

            // Копируем текст в буфер обмена
            navigator.clipboard.writeText(finalFullText).then(() => {
                // Показываем статус на экране
                const status = document.getElementById('status');
                status.style.display = 'block';

                // Через 1.5 секунды открываем GitHub Gist в новой вкладке
                setTimeout(() => {
                    status.style.display = 'none';
                    window.open('https://gist.github.com', '_blank');
                }, 1500);
            }).catch(err => {
                alert('Не удалось скопировать код автоматически: ', err);
            });
        }
    </script>

</body>
</html>
