    <script>
        let rawConfigText = "";

        function showGenerator() {
            document.getElementById('generatorBlock').style.display = 'block';
        }

        // Логика обработки при нажатии кнопки "Создать"
        function processCreation() {
            const code = document.getElementById('vpnCode').value || '';
            const user = document.getElementById('userName').value || 'User';
            const title = document.getElementById('subTitle').value || 'User Information';
            const date = document.getElementById('expDate').value || '∞';

            // Генерируем текст подписки для черного экрана (Фото 3)
            rawConfigText = 
`# profile-title: ${title}
#!name=${title}
# profile-update-interval: 1
# profile-web-page-url: https://max.ru
# support-url: https://max.ru
# subscription-userinfo: upload=0; download=0; total=0

${code}`;

            // Заполняем данными Панель с лимитами (Фото 2)
            document.getElementById('displayTitle').innerText = title;
            document.getElementById('displayUser').innerText = user;
            document.getElementById('displayDate').innerText = date;
            
            // Заполняем список кодов построчно
            const listContainer = document.getElementById('displayCodesList');
            listContainer.innerHTML = "";
            const lines = code.split('\n');
            lines.forEach(line => {
                if(line.trim() !== "") {
                    const li = document.createElement('li');
                    li.className = "link-item";
                    li.innerText = line;
                    listContainer.appendChild(li);
                }
            });

            // Генерируем уникальную ссылку, кодируя данные в URL-адрес страницы
            const currentUrl = window.location.href.split('?')[0];
            const encodedData = btoa(unescape(encodeURIComponent(JSON.stringify({title, user, date, code}))));
            
            // Твоя хитрость: сразу добавляем &app=true в копируемую ссылку, чтобы Nekobox гарантированно читал Base64!
            const finalGeneratedUrl = currentUrl + "?data=" + encodedData + "&app=true";

            // Выводим ссылку на экран и показываем новые кнопки
            document.getElementById('generatedUrl').innerText = finalGeneratedUrl;
            document.getElementById('linkOutput').style.display = 'block';
        }

        // Кнопка "Открыть" — выводит всё на черный фон, как на фото 3
        function openBlackScreen() {
            const blackScreen = document.getElementById('blackScreen');
            blackScreen.innerText = rawConfigText;
            blackScreen.style.display = 'block';
            
            blackScreen.onclick = function() {
                blackScreen.style.display = 'none';
            }
        }

        // Кнопка "Копировать Ссылку"
        function copyUrlToClipboard() {
            const urlText = document.getElementById('generatedUrl').innerText;
            navigator.clipboard.writeText(urlText).then(() => {
                alert('Ссылка скопирована!');
            });
        }

        // твоя доработанная автоматическая загрузка панели или выдача чистого Base64
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const dataParam = urlParams.get('data');
            if (dataParam) {
                try {
                    const decodedData = JSON.parse(decodeURIComponent(escape(atob(dataParam))));
                    
                    // Формируем чистый текст подписки со всеми метаданными
                    const subscriptionText = 
`# profile-title: ${decodedData.title}
#!name=${decodedData.title}
# profile-update-interval: 1
# profile-web-page-url: https://max.ru
# support-url: https://max.ru
# subscription-userinfo: upload=0; download=0; total=0

${decodedData.code}`;

                    // Генерируем чистый Base64 код для приложения
                    const base64Output = btoa(unescape(encodeURIComponent(subscriptionText)));

                    // Проверяем, кто делает запрос
                    const userAgent = navigator.userAgent.toLowerCase();
                    const isVpnApp = userAgent.includes('nekobox') || 
                                     userAgent.includes('happ') || 
                                     userAgent.includes('v2ray') || 
                                     userAgent.includes('clash') ||
                                     userAgent.includes('sing-box') ||
                                     urlParams.get('app') === 'true'; // Твой козырь

                    if (isVpnApp) {
                        // Очищаем страницу и отдаем ТОЛЬКО чистый текст Base64, без HTML тегов
                        document.open("text/plain");
                        document.write(base64Output);
                        document.close();
                        return; // Останавливаем выполнение кода
                    }

                    // --- ОСТАЛЬНОЙ КОД ДЛЯ ЧЕЛОВЕКА (БРАУЗЕРА) ---
                    // ИСПРАВЛЕНО: убран баг с двойным .style.style
                    document.getElementById('startScreen').style.display = 'none';
                    document.getElementById('generatorBlock').style.display = 'none';
                    
                    document.getElementById('displayTitle').innerText = decodedData.title;
                    document.getElementById('displayUser').innerText = decodedData.user;
                    document.getElementById('displayDate').innerText = decodedData.date;
                    
                    const listContainer = document.getElementById('displayCodesList');
                    listContainer.innerHTML = "";
                    const lines = decodedData.code.split('\n');
                    lines.forEach(line => {
                        if(line.trim() !== "") {
                            const li = document.createElement('li');
                            li.className = "link-item";
                            li.innerText = line;
                            listContainer.appendChild(li);
                        }
                    });
                    
                    // Сохраняем текст для кнопки "Открыть" (черный экран) на случай, если человек перешел по ссылке
                    rawConfigText = subscriptionText;
                    
                    document.getElementById('finalPanel').style.display = 'block';
                } catch(e) {
                    console.error("Ошибка разбора ссылки подписки", e);
                }
            }
        }
                </script>
