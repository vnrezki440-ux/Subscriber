<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            box-sizing: border-box;
            background: #fff;
            border: 2px solid #333;
            border-radius: 12px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .subtitle {
            font-size: 16px;
            color: #555;
            margin-bottom: 25px;
        }
        /* Главная кнопка открытия */
        .open-btn {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .open-btn:active {
            background-color: #555;
        }
        /* Скрытый по умолчанию блок с клетками */
        #generatorBlock {
            display: none;
            text-align: left;
            margin-top: 25px;
            border-top: 1px dashed #ccc;
            padding-top: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #444;
        }
        /* Клетка для кода */
        .input-short {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: 2px solid #333;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #fafafa;
        }
        /* Длинные клетки для текста */
        .input-long {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            border: 2px solid #333;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #fafafa;
        }
        .create-btn {
            width: 100%;
            padding: 14px;
            background-color: #2ea44f;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
        }
        .create-btn:active {
            background-color: #24823e;
        }

        /* --- СТИЛИ ДЛЯ ВАШЕЙ ФИНАЛЬНОЙ ПАНЕЛИ ПОДПИСКИ --- */
        #finalPanel {
            display: none;
            text-align: left;
        }
        .info-row {
            margin-bottom: 5px;
            font-size: 14px;
        }
        .info-label {
            font-weight: normal;
            color: #555;
        }
        .links-title {
            font-weight: bold;
            margin-top: 25px;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .links-list {
            list-style-type: disc;
            padding-left: 20px;
            margin: 0;
        }
        .link-item {
            margin-bottom: 12px;
            word-break: break-all;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div id="startScreen">
            <h1>Панель управления</h1>
            <div class="subtitle">Нажмите на "Создать мой панель"</div>
            <button class="open-btn" onclick="showGenerator()">Создать мой панель</button>
        </div>

        <div id="generatorBlock">
            <div class="input-group">
                <label>Отправите ваш код</label>
                <input type="text" id="vpnCode" class="input-short" placeholder="Вставьте сюда ваш VPN код...">
            </div>
            
            <div class="input-group">
                <label>Отправите ваш имя пользователя</label>
                <input type="text" id="userName" class="input-long" placeholder="Введите имя пользователя...">
            </div>
            
            <div class="input-group">
                <label>Отправите название для подписки</label>
                <input type="text" id="subTitle" class="input-long" placeholder="Например: User Information">
            </div>
            
            <div class="input-group">
                <label>Отправите время окончании для подписок</label>
                <input type="text" id="expDate" class="input-long" placeholder="Например: 15 Gun или Дату и время">
            </div>

            <button class="create-btn" onclick="buildFinalPanel()">Создать</button>
        </div>

        <div id="finalPanel">
            <h1 id="displayTitle">User Information</h1>
            
            <div class="info-row"><span class="info-label">Username:</span> <span id="displayUser"></span></div>
            
            <div class="info-row"><span class="info-label">Status:</span> active</div>
            <div class="info-row"><span class="info-label">Data Limit:</span> ∞</div>
            <div class="info-row"><span class="info-label">Data Used:</span> 0B</div>
            
            <div class="info-row"><span class="info-label">Expiration Date:</span> <span id="displayDate"></span></div>

            <div class="links-title">Links:</div>
            
            <ul class="links-list">
                <li class="link-item" id="displayCode"></li>
            </ul>
        </div>
    </div>

    <script>
        // Функция открытия генератора
        function showGenerator() {
            document.getElementById('generatorBlock').style.display = 'block';
        }

        // Функция сборки вашей персональной панели
        function buildFinalPanel() {
            // Считываем то, что ты написал в клетки
            const code = document.getElementById('vpnCode').value || 'Тут будет ваш код';
            const user = document.getElementById('userName').value || 'User';
            const title = document.getElementById('subTitle').value || 'User Information';
            const date = document.getElementById('expDate').value || '∞';

            // Полностью прячем интерфейс создания
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('generatorBlock').style.display = 'none';

            // Переносим данные в итоговый шаблон
            document.getElementById('displayTitle').innerText = title;
            document.getElementById('displayUser').innerText = user;
            document.getElementById('displayDate').innerText = date;
            document.getElementById('displayCode').innerText = code;

            // Отображаем готовую панель на экране
            document.getElementById('finalPanel').style.display = 'block';
        }
    </script>

</body>
                                      </html>
