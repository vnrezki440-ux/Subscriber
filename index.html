<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscriber</title>
    <style>
        /* Выравнивание всего содержимого строго по центру экрана */
        body {
            font-family: sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .menu-container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }
        /* Стиль главного заголовка */
        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            font-weight: bold;
        }
        /* Стили для кнопок-ссылок */
        .sub-button {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #ffffff;
            color: #333333;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid #333333;
            border-radius: 8px;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        /* Эффект при нажатии на кнопку */
        .sub-button:active {
            background-color: #333333;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1>Subscriber</h1>
        
        <!-- Кнопка для Github Subscription -->
        <a href="https://gist.github.com" class="sub-button">Github Subscription</a>
        
        <!-- Кнопка для Pasta Subscription -->
        <a href="https://pastee.dev" class="sub-button">Pasta Subscription</a>
    </div>

</body>
</html>
